image: node:20-alpine

variables:
  PROJECT_NAME: "uber"

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build
    - mkdir -p /var/opt/gitlab/gitlab-rails/shared/pages/root/work/$PROJECT_NAME
    - cp -r public/* /var/opt/gitlab/gitlab-rails/shared/pages/root/work/$PROJECT_NAME/
  artifacts:
    paths:
      - public
  only:
    - main

mirror_to_github:
  stage: deploy
  script:
    # Git уже установлен на сервере, не нужно устанавливать
    - git push https://paveltomilov:${GITHUB_TOKEN}@github.com/paveltomilov/uber.git HEAD:main
  only:
    - main
  needs: []
