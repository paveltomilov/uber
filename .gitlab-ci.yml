image: node:18

stages:
  - build
  - deploy

cache:
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - main
    - master

pages:
  stage: deploy
  script:
    - rm -rf public
    - mkdir -p public/uber # создаем папку uber
    - cp -r dist/* public/uber/ # копируем содержимое dist в public/uber
  artifacts:
    paths:
      - public
  only:
    - main
    - master
