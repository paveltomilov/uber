# .gitlab-ci.yml
image: node:18

stages:
  - build
  - deploy

cache:
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - main
    - master

pages:
  stage: deploy
  script:
    - rm -rf public
    - cp -r dist public
  artifacts:
    paths:
      - public
  only:
    - main
    - master
